# ---------------- PropertyShop ----------------

# Safety cap: most chunks a single wand selection can grab at once.
max-selection-chunks: 256
# Properties are sets of chunks an admin lists for sale. Players buy them with
# real items and then own them. Owners (and admins) can build and use containers
# inside their plot; everyone else is blocked from the "protected" blocks below
# but can still use anything else - which is how DisplayShops keeps working.

# When someone walks into a property chunk, show this on their action bar.
action-bar:
  enabled: true
  # Shown to anyone standing in a FOR-SALE plot. No property name - just the price.
  for-sale: "&a&lFOR SALE &7- Price: &f{price} &7- &f/property buy"

# How long (seconds) the /property preview chunk outline shows.
preview-seconds: 6

# How many chunks away players can see a for-sale plot's green ring (and its hologram
# appears within entity range). Keep at or below your server view-distance.
for-sale-ring:
  view-chunks: 8

# Blocks outsiders may NOT use inside a property (right-click).
# Everything not on this list still works for everyone (so shops, etc. are fine).
# Use Minecraft material names. Tags below auto-include whole groups.
protect-tags:
  doors: true          # all doors
  trapdoors: true      # all trapdoors
  fence-gates: true    # all fence gates
  buttons: true        # all buttons
  shulker-boxes: true  # all shulker box colors
  beds: true           # all beds
protected-blocks:
  - CHEST
  - TRAPPED_CHEST
  - BARREL
  - HOPPER
  - DISPENSER
  - DROPPER
  - FURNACE
  - BLAST_FURNACE
  - SMOKER
  - BREWING_STAND
  - LEVER
  - ANVIL
  - CHIPPED_ANVIL
  - DAMAGED_ANVIL
  - LECTERN
  - GRINDSTONE
  - CARTOGRAPHY_TABLE
  - LOOM
  - SMITHING_TABLE
  - BEACON

# -------------------- PLOT BORDER --------------------
# A client-side yellow/black border shown to the owner/trusted when they're inside
# their plot. It's fake (sent only to that player) - it can't be broken and never
# changes anyone's real blocks. Sits 1 block outside the plot, on the top surface.
border:
  enabled: true
  # Yellow/black ring shown to the OWNER & trusted inside an owned plot (private).
  owned:
    block-a: YELLOW_CONCRETE
    block-b: BLACK_CONCRETE
  # Green ring shown to EVERYONE inside a for-sale plot so they know it's available.
  for-sale:
    block-a: LIME_CONCRETE
    block-b: GREEN_CONCRETE

# -------------------- ENTRY TITLE --------------------
# Big fading text shown when a player ENTERS a plot (owned -> title + description,
# for-sale -> "FOR SALE" + price). It fades out on its own.
titles:
  enabled: true
  fade-in-ms: 300
  stay-ms: 2000
  fade-out-ms: 1000
  # One-line caps so the text never wraps to a second line.
  max-title-length: 24
  max-description-length: 40

# -------------------- WAND MAP --------------------
# While an op holds the wand, nearby chunks are shaded: RED = already claimed/taken,
# BLUE = free. Your current selection shows as a green outline on top.
# radius = how many chunks out from you to shade (2 = a 5x5 grid).
wand-map:
  radius: 2

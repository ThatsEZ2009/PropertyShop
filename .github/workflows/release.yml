name: Release PropertyShop

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build the plugin
        run: mvn -B clean package

      - name: Publish the jar to Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "build-${{ github.run_number }}" target/PropertyShop.jar --title "PropertyShop latest" --notes "Download PropertyShop.jar below and put it in your plugins folder." --latest
